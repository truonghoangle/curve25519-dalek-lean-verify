name = "Curve25519Dalek"
version = "0.1.0"
keywords = ["formal verification"]
defaultTargets = ["Curve25519Dalek"]

[leanOptions]
pp.unicode.fun = true # pretty-prints `fun a ↦ b`
autoImplicit = false
relaxedAutoImplicit = false
linter.mathlibStandardSet = true
maxSynthPendingDepth = 3
maxRecDepth = 10000

[[require]]
name = "aeneas"
git = "https://github.com/AeneasVerif/aeneas.git"
subDir = "backends/lean"
rev = "1b39931d"

[[require]]
name = "PrimeCert"
git = "https://github.com/b-mehta/PrimeCert.git"
rev = "15fd61770c9a893af0f5cb7893ea98b7d0bf8d52"

[[lean_lib]]
name = "Curve25519Dalek"

[[lean_lib]]
name = "Utils"

# Test suites: the project-linter `#guard_msgs` tests (`Tests.LinterTest.*`) and the
# property-based Plausible tests (`Tests.PlausibleTests.*`).  Deliberately NOT in
# `defaultTargets`, so neither the dummy `@[step]` linter theorems nor the randomized
# Plausible checks run on a normal `lake build` — keeping the test `@[step]` theorems out
# of the production library and Aeneas's global `@[step]` database.  Run them explicitly
# with `lake build Tests`.  The `Tests.lean` root module imports both submodules, so Lake
# discovers the whole suite from it.
[[lean_lib]]
name = "Tests"

[[lean_exe]]
name = "listfuns"
root = "Utils.ListFuns"
supportInterpreter = true

[[lean_exe]]
name = "syncstatus"
root = "Utils.SyncStatus"
supportInterpreter = true
